name: Daily News Agent V1

on:
  # workflow_dispatch:
  # schedule:
  #   - cron: '30 22 * * *'
  # push:
  #   branches: [ "main" ]
  #   paths:
  #     - 'v1/**'

jobs:
  run-news-agent-v1:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        cd v1
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run News Agent V1
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        cd v1
        python main.py

    - name: Deploy report to GitHub Pages (docs/)
      run: |
        mkdir -p docs
        if [ -f v1/outputs/latest.html ]; then
          cp v1/outputs/latest.html docs/index.html
          echo "✅ HTML 리포트를 docs/index.html에 복사 완료."
        else
          echo "⚠️ latest.html 없음 — 건너뜁니다."
          exit 0
        fi
        git config user.name "BoBo News Agent"
        git config user.email "news_agent@ai.local"
        git add docs/index.html
        if git diff --staged --quiet; then
          echo "📌 변경사항 없음. 커밋 생략."
        else
          git commit -m "📰 뉴스 리포트 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
        fi
